name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: write
  issues: write

concurrency:
  group: claude-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    if: ${{ !github.event.pull_request.draft && secrets.ANTHROPIC_API_KEY != '' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Run Claude Code Action
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: >
            Review this pull request for code quality, correctness, security,
            and install-flow regressions. Focus on actionable findings and
            reference specific files.
          claude_args: |
            --max-turns 5
