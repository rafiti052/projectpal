name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - pr/**

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Install
        run: pnpm install --frozen-lockfile=false

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit Tests
        run: pnpm test

      - name: Validate Platform Manifests
        run: sh scripts/validate-platform.sh all

      - name: Smoke Install
        run: sh scripts/smoke-install.sh

      - name: Integration Tests
        run: sh scripts/test-integration.sh
